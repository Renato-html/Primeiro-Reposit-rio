<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>

 <link rel="stylesheet" href="stylecadastro.css">

</head>

<body>

  <div class="login-container">
    <h1>Cadastrar</h1>

    <form>
      <div class="input-group">
        <label>Email</label>
        <input type="email" placeholder="Digite seu email">
      </div>

      <div class="input-group">
        <label>Senha</label>
        <input type="password" placeholder="Digite sua senha">
      </div>

      <div class="input-group">
        <label>Confirmar Senha</label>
        <input type="password" placeholder="Confirmar">
      </div>

       <div class="input-group">
        <label>CPF</label>
        <input type="text" placeholder="Digite seu CPF">
      </div>

             <div class="input-group">
        <label>Celular/Telefone</label>
        <input type="text" placeholder="(DDD-Numero)">
      </div>

   <div class="checkbox-area">

    <label>
        <input type="checkbox">
        Aceito os Termos de Uso
    </label>

    <label>
        <input type="checkbox">
        Aceito a Política de Privacidade
    </label>

    <div class="links-termos">
        <a href="termos.html">Ler Termos de Uso</a>
        <a href="privacidade.html">Ler Política de Privacidade</a>
    </div>
    
 <a href="site.html" class="btn-confirmar">Confirmar</a>
  </div>

</body>
</html>
