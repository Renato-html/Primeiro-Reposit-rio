<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema ESF</title>
    <link rel="stylesheet" href="menuprincipal.css">

    <!-- Ícones -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <!-- SIDEBAR -->
    <aside class="sidebar">

        <div class="user-card">
            <div class="user-icon">
                <i class="fa-regular fa-user"></i>
            </div>

            <div class="user-info">
                <h4>Renato Junior</h4>
                <p>CRM:7239074</p>
                <span>Clínico Geral</span>
            </div>
        </div>

        <nav class="menu-lateral">
            <button>Pacientes</button>
            <button>Perfil</button>
            <button>Ajuda</button>
            <button>Avisos</button>
            <button>Configurações</button>
            <button>SAC</button>
        </nav>

    </aside>

    <!-- CONTEÚDO -->
    <main class="content">

        <!-- TOPO -->
        <header class="topbar">

            <div class="logo">
                <h1>SISTEMA ESF</h1>
            </div>

            <div class="search-box">
                <input type="text" placeholder="Pesquisar...">
                <i class="fa-solid fa-magnifying-glass"></i>
            </div>

            <div class="sus-logo">
                <h2>SUS</h2>
                <span>Sistema Único de Saúde</span>
            </div>

        </header>

        <!-- MENU PRINCIPAL -->
        <section class="main-panel">

            <div class="title-box">
                <h2>MENU PRINCIPAL</h2>
            </div>

            <div class="cards">

                <div class="card">
                    <h3>Consultas</h3>
                    <i class="fa-solid fa-user-doctor"></i>
                </div>

                <div class="card">
                    <h3>Visitas</h3>
                    <i class="fa-solid fa-house"></i>
                </div>

                <div class="card">
                    <h3>Vacinas</h3>
                    <i class="fa-solid fa-syringe"></i>
                </div>

                <div class="card">
                    <h3>Medicamentos</h3>
                    <i class="fa-solid fa-pills"></i>
                </div>

                <div class="card">
                    <h3>Grupos Prioritários</h3>
                    <i class="fa-solid fa-people-group"></i>
                </div>

                <div class="card">
                    <h3>Pendências e Atrasos</h3>
                    <i class="fa-regular fa-clock"></i>
                </div>

                <div class="card">
                    <h3>Cadastro de Famílias</h3>
                    <i class="fa-solid fa-people-roof"></i>
                </div>

                <div class="card">
                    <h3>Central de Relatórios</h3>
                    <i class="fa-solid fa-file-lines"></i>
                </div>

                <div class="card">
                    <h3>Agendamentos</h3>
                    <i class="fa-regular fa-calendar"></i>
                </div>

            </div>

        </section>

    </main>

</body>
</html>
