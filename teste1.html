<!DOCTYPE html>
<html lang="pt-br">
<head>
        <meta charset="UTF-8">
        <title>formulário</title>
</head>
<body>
    <h1>Cadastro</h1>
    <form id="Login" method="POST">

        <label>CPF:</label>
        <input type="number" name="cpf" id="cpf"><br><br>

        <label>Senha:</label>
        <input type="password" name="senha" id="senha"><br><br>

        <label>SUS:</label>
        <input type="number" name="sus" id="sus"><br><br>
        
        <button type="submit">Enviar</button>
    </form>
</body>
</html>
